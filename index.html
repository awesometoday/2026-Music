<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好森 Awesome Today</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f5f0e8;
  }

  /* ── 課程列 ── */
  .course-row {
    background: #fff;
    padding: 20px 28px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    border-bottom: 1px solid #ede8de;
  }

  .age-badge {
    background: #f5f0e8;
    color: #7a6a52;
    font-size: 13px;
    font-weight: 500;
    border-radius: 20px;
    padding: 5px 13px;
    white-space: nowrap;
    margin-top: 3px;
    flex-shrink: 0;
  }

  .course-info h2 {
    font-size: 17px;
    font-weight: 600;
    color: #2c2c2a;
    margin-bottom: 7px;
    letter-spacing: 0.01em;
  }

  .course-info p {
    font-size: 14px;
    color: #5f5e5a;
    line-height: 1.75;
  }

  /* ── 聯絡區塊 ── */
  .contact-section {
    background: #4e6b55;
    padding: 52px 28px 48px;
    text-align: center;
    color: #fff;
  }

  .contact-section h2 {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 18px;
    line-height: 1.4;
    letter-spacing: 0.02em;
  }

  .contact-section .desc {
    font-size: 15px;
    color: rgba(255,255,255,0.85);
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .line-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #06C755;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 50px;
    padding: 14px 32px;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
    margin-bottom: 16px;
  }

  .line-btn:hover { opacity: 0.88; }

  .line-icon {
    width: 24px;
    height: 24px;
    background: #fff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .line-icon svg { width: 18px; height: 18px; }

  .hours {
    display: block;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }

  .address {
    font-size: 13.5px;
    color: rgba(255,255,255,0.8);
    line-height: 1.8;
  }

  .address .pin {
    display: inline-block;
    margin-right: 4px;
    font-size: 14px;
  }

  .address .note {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
  }
</style>
</head>
<body>

  <!-- 課程列 -->
  <div class="course-row">
    <span class="age-badge">4～9 歲</span>
    <div class="course-info">
      <h2>Music Play 大童鍵盤班</h2>
      <p>從遊戲走向彈奏，培養專注與自信的音樂心。從遊戲中探索，在節奏裡成長。</p>
    </div>
  </div>

  <!-- 聯絡區塊 -->
  <div class="contact-section">
    <h2>準備好帶孩子來玩了嗎？</h2>
    <p class="desc">
      預約體驗課、詢問課程，或者只是想多了解一點<br>
      ——傳 LINE 給我們就好。
    </p>

    <a class="line-btn" href="https://lin.ee/xVilVIx" target="_blank" rel="noopener">
      <span class="line-icon">
        <svg viewBox="0 0 24 24" fill="#06C755" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.14 2 11.25c0 4.07 2.635 7.54 6.438 9.06.281.105.665.32.765.74.09.38.059.97.029 1.35l-.123.76c-.037.23-.173.9.79.49 1.052-.46 5.67-3.34 7.737-5.72C19.084 16.2 22 13.88 22 11.25 22 6.14 17.523 2 12 2z"/>
        </svg>
      </span>
      加 LINE 詢問 ／ 預約體驗
    </a>

    <span class="hours">週一至週六 09:00–21:00 皆可傳訊</span>

    <div class="address">
      <span class="pin">📍</span>
      台南市南區鹽埕路 291 巷 94 弄 10 號 3F<br>
      <span class="note">（好森 Awesome Today｜近誠品碳佐麻里園區，1F 為漫漫弄）</span>
    </div>
  </div>

</body>
</html>
